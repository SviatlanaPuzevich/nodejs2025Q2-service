info:
  title: Home Library Service
  description: Home music library service
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  schemas:
    ResponseUserDto:
      type: object
      properties:
        login:
          type: string
          example: TestUser
        version:
          type: number
          example: 1
        createdAt:
          type: number
          example: 1655000000
        updatedAt:
          type: number
          example: 1655000000
      required:
        - login
        - version
        - createdAt
        - updatedAt
    CreateUserDto:
      type: object
      properties:
        login:
          type: string
          example: TestUser
        password:
          type: string
          example: secret_password
      required:
        - login
        - password
    UpdatePasswordDto:
      type: object
      properties:
        oldPassword:
          type: string
          example: secret_password
          description: The user's old password
        newPassword:
          type: string
          example: secret_password2
          description: The user's new password
      required:
        - oldPassword
        - newPassword
    Artist:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          example: Freddie Mercury
        grammy:
          type: boolean
          example: false
      required:
        - id
        - name
        - grammy
    ArtistDto:
      type: object
      properties:
        name:
          type: string
          example: Freddie Mercury
        grammy:
          type: boolean
          example: false
      required:
        - name
        - grammy
    Album:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          example: Innuendo
        year:
          type: number
          example: 1991
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      required:
        - id
        - name
        - year
        - artistId
    AlbumDto:
      type: object
      properties:
        name:
          type: string
          example: Innuendo
        year:
          type: number
          example: 1991
        artistId:
          type: string
      required:
        - name
        - year
        - artistId
    Track:
      type: object
      properties:
        id:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          example: The Show Must Go On
        duration:
          type: number
          example: 262
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        albumId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      required:
        - id
        - name
        - duration
        - artistId
        - albumId
    TrackDto:
      type: object
      properties:
        name:
          type: string
          example: The Show Must Go On
        duration:
          type: number
          example: 262
          description: in seconds
        artistId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        albumId:
          type: string
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      required:
        - name
        - duration
        - artistId
        - albumId
    FavoritesResponse:
      type: object
      properties: {}
