services:
  postgres_db:
    build:
      context: .
      dockerfile: postrgres.Dockerfile
    restart: on-failure
    container_name: postgres_home_library
    environment:
       - POSTGRES_USER=${POSTGRES_USER}
       - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
       - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 2s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home_network
  app_api:
    build:
      context: .
      dockerfile: build.Dockerfile
    container_name: home_library_api
    restart: on-failure
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./src:/app/src
      - ./test:/app/test
      - ./prisma:/app/prisma
      - /app/node_modules
      - ./logs_volume:/app/logs
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - home_network

networks:
  home_network:
    driver: bridge

volumes:
  postgres_data:
  logs_volume: